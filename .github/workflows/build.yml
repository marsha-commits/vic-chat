name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # bisa trigger manual dari GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (release)
        run: flutter build apk --release --no-shrink

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/vic-chat.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vic-chat
          path: build/app/outputs/flutter-apk/vic-chat.apk
          retention-days: 7
